<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Explorador DOM</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h1 id="titulo">Mi Lista de Tareas</h1>

<input type="text" id="nuevaTarea" placeholder="Escribe una tarea...">
<button id="btnAgregar">Agregar</button>

<ul id="listaTareas"></ul>

<hr>

<h2>Dashboard de Usuarios</h2>

<input type="search" id="busqueda" placeholder="Buscar usuario...">
<button id="btnCargar">Cargar Usuarios</button>

<div id="spinner" hidden>
⏳ Cargando datos...
</div>

<section id="contenedor-usuarios"></section>

<hr>

<h2>Tabs</h2>

<div class="tabs-container">

<div class="tabs">

<button data-tab="1" class="activo">Tab 1</button>
<button data-tab="2">Tab 2</button>

</div>

<div class="panel activo" data-panel="1">

<p>Contenido del tab 1</p>

</div>

<div class="panel" data-panel="2">

<p>Contenido del tab 2</p>

</div>

</div>

<hr>

<h2>Acordeón</h2>

<div class="mi-acordeon">

<div class="acordeon-item">

<div class="acordeon-header">Pregunta 1</div>

<div class="acordeon-cuerpo">
Contenido del acordeón
</div>

</div>

<div class="acordeon-item">

<div class="acordeon-header">Pregunta 2</div>

<div class="acordeon-cuerpo">
Contenido del acordeón
</div>

</div>

</div>

<hr>

<h2>Carrusel</h2>

<div class="mi-carrusel">

<div class="slide activo">Slide 1</div>
<div class="slide">Slide 2</div>
<div class="slide">Slide 3</div>

</div>

<hr>

<button
data-modal
data-titulo="Modal de ejemplo"
data-contenido="Este es el contenido del modal">
Abrir Modal
</button>

<div id="modal-principal" class="modal">

<div class="modal-overlay"></div>

<div class="modal-contenido">

<button class="modal-cerrar">✕</button>

<h3 class="modal-titulo"></h3>

<div class="modal-cuerpo"></div>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
